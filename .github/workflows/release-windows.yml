name: release-windows-portable

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Optional release version override, for example 0.1.1
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend test dependencies
        shell: pwsh
        run: python -m pip install -r python_backend/requirements.txt

      - name: Run backend tests
        shell: pwsh
        run: python -m unittest discover -s python_backend/tests -v

      - name: Run frontend tests
        shell: pwsh
        run: npm run test

      - name: Download runtime source archives
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw scripts/runtime-manifest.json | ConvertFrom-Json

          $pythonArchiveUrl = "https://www.python.org/ftp/python/$($manifest.python.version)/$($manifest.python.embeddableArchive)"
          $nodeArchiveUrl = "https://nodejs.org/dist/v$($manifest.node.version)/$($manifest.node.archive)"

          $vendorRoot = Join-Path $env:RUNNER_TEMP "vendor"
          $pythonDownloadDir = Join-Path $vendorRoot "downloads/python"
          $nodeDownloadDir = Join-Path $vendorRoot "downloads/node"

          foreach ($dir in @($pythonDownloadDir, $nodeDownloadDir)) {
            New-Item -ItemType Directory -Force -Path $dir | Out-Null
          }

          $pythonArchivePath = Join-Path $pythonDownloadDir $manifest.python.embeddableArchive
          $nodeArchivePath = Join-Path $nodeDownloadDir $manifest.node.archive

          Write-Host "Downloading Python embeddable package: $pythonArchiveUrl"
          Invoke-WebRequest -Uri $pythonArchiveUrl -OutFile $pythonArchivePath

          Write-Host "Downloading Node.js archive: $nodeArchiveUrl"
          Invoke-WebRequest -Uri $nodeArchiveUrl -OutFile $nodeArchivePath

          "TAURI_AGENT_VENDOR_ROOT=$vendorRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Runtime source archives downloaded to $vendorRoot"

      - name: Prepare embedded runtimes
        shell: pwsh
        run: |
          ./scripts/prepare-runtimes.ps1 -VendorRoot $env:TAURI_AGENT_VENDOR_ROOT

      - name: Build backend sidecar
        shell: pwsh
        run: |
          # Create a build venv using the system Python (not the embedded runtime).
          # The embedded Python from vendor is designed for end-user runtime, not
          # for building. Its pip/dependency resolution can silently skip packages
          # (e.g. typing_extensions on Python 3.13 embeddable).
          python -m venv python_backend/.venv
          ./scripts/build-backend.ps1 -VendorRoot $env:TAURI_AGENT_VENDOR_ROOT -SkipRuntimePrepare

      - name: Run Rust tests
        shell: pwsh
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Resolve release version
        shell: pwsh
        run: |
          $releaseVersion = "${{ github.event.inputs.release_version }}"

          if (-not [string]::IsNullOrWhiteSpace($releaseVersion)) {
            # Strip leading 'v' if present (e.g. "v0.5.17" -> "0.5.17")
            if ($releaseVersion.StartsWith("v")) {
              $releaseVersion = $releaseVersion.Substring(1)
            }
          } elseif ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME.StartsWith("v")) {
            $releaseVersion = $env:GITHUB_REF_NAME.Substring(1)
          }

          "RELEASE_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build portable release
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_VERSION)) {
            ./scripts/release.ps1 -VendorRoot $env:TAURI_AGENT_VENDOR_ROOT -SkipRuntimePrepare
          } else {
            ./scripts/release.ps1 -Version $env:RELEASE_VERSION -VendorRoot $env:TAURI_AGENT_VENDOR_ROOT -SkipRuntimePrepare
          }

      - name: Smoke test packaged backend
        shell: pwsh
        run: |
          $portableZips = @(Get-ChildItem -Path artifacts/release -Recurse -Filter *.zip)
          if ($portableZips.Count -ne 1) {
            throw "Expected exactly one portable ZIP artifact, found $($portableZips.Count)."
          }

          $runtimeZip = $portableZips[0]

          $smokeRoot = Join-Path $env:RUNNER_TEMP "portable-smoke"
          if (Test-Path -LiteralPath $smokeRoot) {
            Remove-Item -LiteralPath $smokeRoot -Recurse -Force
          }

          Expand-Archive -LiteralPath $runtimeZip.FullName -DestinationPath (Join-Path $smokeRoot "runtime") -Force

          $runtimeAppRoot = Get-ChildItem -Path (Join-Path $smokeRoot "runtime") -Directory | Select-Object -First 1
          if ($null -eq $runtimeAppRoot) {
            throw "Runtime ZIP did not extract a portable app directory."
          }

          if (Test-Path -LiteralPath (Join-Path $runtimeAppRoot.FullName "resources/resources")) {
            throw "Runtime ZIP still contains nested resources/resources directories."
          }

          $appExe = Get-ChildItem -Path $runtimeAppRoot.FullName -File -Filter "work agent.exe" | Select-Object -First 1
          if ($null -eq $appExe) {
            throw "Portable app executable work agent.exe was not found under $($runtimeAppRoot.FullName)"
          }

          foreach ($requiredRuntimeDir in @(
            (Join-Path $runtimeAppRoot.FullName "runtimes/python"),
            (Join-Path $runtimeAppRoot.FullName "runtimes/node")
          )) {
            if (-not (Test-Path -LiteralPath $requiredRuntimeDir)) {
              throw "Runtime ZIP is missing required runtime directory: $requiredRuntimeDir"
            }
          }

          $backendExe = Get-ChildItem -Path (Join-Path $smokeRoot "runtime") -Recurse -Filter core.exe | Select-Object -First 1
          if ($null -eq $backendExe) {
            throw "Packaged backend executable was not found after extracting $($runtimeZip.FullName)"
          }

          $stdoutLog = Join-Path $smokeRoot "backend-stdout.log"
          $stderrLog = Join-Path $smokeRoot "backend-stderr.log"

          $process = Start-Process -FilePath $backendExe.FullName -PassThru `
            -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog -NoNewWindow

          try {
            $healthy = $false
            for ($attempt = 0; $attempt -lt 15; $attempt++) {
              Start-Sleep -Seconds 1

              # Check if backend process crashed (exited before health check passed)
              if ($process.HasExited) {
                Write-Host "Backend process exited prematurely with code $($process.ExitCode)"
                Write-Host "=== STDOUT ==="
                if (Test-Path -LiteralPath $stdoutLog) { Get-Content -LiteralPath $stdoutLog }
                Write-Host "=== STDERR ==="
                if (Test-Path -LiteralPath $stderrLog) { Get-Content -LiteralPath $stderrLog }
                throw "Backend crashed on startup (exit code $($process.ExitCode)). Check logs above."
              }

              try {
                $response = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:8765/health"
                if ($response.StatusCode -eq 200) {
                  $healthy = $true
                  Write-Host "Backend health check passed (attempt $($attempt + 1))"
                  break
                }
              }
              catch {
              }
            }

            if (-not $healthy) {
              Write-Host "Backend never became healthy after 15 attempts"
              Write-Host "=== STDOUT ==="
              if (Test-Path -LiteralPath $stdoutLog) { Get-Content -LiteralPath $stdoutLog }
              Write-Host "=== STDERR ==="
              if (Test-Path -LiteralPath $stderrLog) { Get-Content -LiteralPath $stderrLog }
              throw "Packaged backend did not become healthy on http://127.0.0.1:8765/health"
            }
          }
          finally {
            if ($null -ne $process -and -not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Upload portable ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-zip
          path: artifacts/release/*/portable/*.zip
          if-no-files-found: error

      - name: Publish ZIP assets to GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $tagName = $env:GITHUB_REF_NAME
          $releaseTitle = $tagName
          $zipFiles = @(Get-ChildItem -Path artifacts/release -Recurse -Filter *.zip)

          if ($zipFiles.Count -ne 1) {
            throw "Expected exactly one portable ZIP artifact before publishing the GitHub release, found $($zipFiles.Count)."
          }

          gh release view $tagName --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tagName --repo $env:GITHUB_REPOSITORY --title $releaseTitle --generate-notes
          }

          gh release upload $tagName --repo $env:GITHUB_REPOSITORY --clobber $zipFiles[0].FullName
