name: release-windows-portable

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Optional release version override, for example 0.1.1
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest
    env:
      TAURI_AGENT_UPDATER_ENDPOINTS: ${{ vars.TAURI_AGENT_UPDATER_ENDPOINTS }}
      TAURI_AGENT_UPDATER_BASE_URL: ${{ vars.TAURI_AGENT_UPDATER_BASE_URL }}
      TAURI_AGENT_UPDATER_PUBKEY: ${{ secrets.TAURI_AGENT_UPDATER_PUBKEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_AGENT_WINDOWS_SIGN_TIMESTAMP_URL: https://timestamp.digicert.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend test dependencies
        shell: pwsh
        run: python -m pip install -r python_backend/requirements.txt

      - name: Run backend tests
        shell: pwsh
        run: python -m unittest discover -s python_backend/tests -v

      - name: Run frontend tests
        shell: pwsh
        run: npm run test

      - name: Run release script tests
        shell: pwsh
        run: ./scripts/tests/release-scripts.tests.ps1

      - name: Download runtime source archives
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw scripts/runtime-manifest.json | ConvertFrom-Json

          $pythonArchiveUrl = "https://www.python.org/ftp/python/$($manifest.python.version)/$($manifest.python.embeddableArchive)"
          $nodeArchiveUrl = "https://nodejs.org/dist/v$($manifest.node.version)/$($manifest.node.archive)"

          $vendorRoot = Join-Path $env:RUNNER_TEMP "vendor"
          $pythonDownloadDir = Join-Path $vendorRoot "downloads/python"
          $nodeDownloadDir = Join-Path $vendorRoot "downloads/node"

          foreach ($dir in @($pythonDownloadDir, $nodeDownloadDir)) {
            New-Item -ItemType Directory -Force -Path $dir | Out-Null
          }

          $pythonArchivePath = Join-Path $pythonDownloadDir $manifest.python.embeddableArchive
          $nodeArchivePath = Join-Path $nodeDownloadDir $manifest.node.archive

          Write-Host "Downloading Python embeddable package: $pythonArchiveUrl"
          Invoke-WebRequest -Uri $pythonArchiveUrl -OutFile $pythonArchivePath

          Write-Host "Downloading Node.js archive: $nodeArchiveUrl"
          Invoke-WebRequest -Uri $nodeArchiveUrl -OutFile $nodeArchivePath

          "TAURI_AGENT_VENDOR_ROOT=$vendorRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Runtime source archives downloaded to $vendorRoot"

      - name: Prepare embedded runtimes
        shell: pwsh
        run: |
          ./scripts/prepare-runtimes.ps1 -VendorRoot $env:TAURI_AGENT_VENDOR_ROOT

      - name: Build backend sidecar
        shell: pwsh
        run: |
          # Create a build venv using the system Python (not the embedded runtime).
          # The embedded Python from vendor is designed for end-user runtime, not
          # for building. Its pip/dependency resolution can silently skip packages
          # (e.g. typing_extensions on Python 3.13 embeddable).
          python -m venv python_backend/.venv
          ./scripts/build-backend.ps1 -VendorRoot $env:TAURI_AGENT_VENDOR_ROOT -SkipRuntimePrepare

      - name: Run Rust tests
        shell: pwsh
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Resolve release version
        shell: pwsh
        run: |
          $releaseVersion = "${{ github.event.inputs.release_version }}"

          if (-not [string]::IsNullOrWhiteSpace($releaseVersion)) {
            # Strip leading 'v' if present (e.g. "v0.5.17" -> "0.5.17")
            if ($releaseVersion.StartsWith("v")) {
              $releaseVersion = $releaseVersion.Substring(1)
            }
          } elseif ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME.StartsWith("v")) {
            $releaseVersion = $env:GITHUB_REF_NAME.Substring(1)
          }

          "RELEASE_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve updater URLs
        shell: pwsh
        run: |
          $pagesBaseUrl = "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          $baseUrl = $env:TAURI_AGENT_UPDATER_BASE_URL
          $endpoints = $env:TAURI_AGENT_UPDATER_ENDPOINTS

          if ([string]::IsNullOrWhiteSpace($baseUrl)) {
            $baseUrl = $pagesBaseUrl
          }

          if ([string]::IsNullOrWhiteSpace($endpoints)) {
            $endpoints = "$baseUrl/latest.json"
          }

          "TAURI_AGENT_UPDATER_BASE_URL=$baseUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TAURI_AGENT_UPDATER_ENDPOINTS=$endpoints" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Resolved updater base URL: $baseUrl"
          Write-Host "Resolved updater endpoints: $endpoints"

      - name: Resolve signtool
        if: ${{ secrets.TAURI_AGENT_WINDOWS_SIGN_CERT_BASE64 != '' }}
        shell: pwsh
        run: |
          $signtool = Get-Command "signtool.exe" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -ErrorAction SilentlyContinue

          if ([string]::IsNullOrWhiteSpace($signtool)) {
            $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
            if (Test-Path -LiteralPath $vswhere) {
              $installationPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.Windows10SDK -property installationPath
              if (-not [string]::IsNullOrWhiteSpace($installationPath)) {
                $searchRoots = @(
                  (Join-Path $installationPath "SDK\ScopeCppSDK"),
                  (Join-Path ${env:ProgramFiles(x86)} "Windows Kits\10\bin")
                )

                foreach ($root in $searchRoots) {
                  if (-not (Test-Path -LiteralPath $root)) {
                    continue
                  }

                  $candidate = Get-ChildItem -Path $root -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
                    Sort-Object FullName -Descending |
                    Select-Object -First 1
                  if ($null -ne $candidate) {
                    $signtool = $candidate.FullName
                    break
                  }
                }
              }
            }
          }

          if ([string]::IsNullOrWhiteSpace($signtool)) {
            throw "signtool.exe was not found on this runner."
          }

          "TAURI_AGENT_WINDOWS_SIGNTOOL_PATH=$signtool" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using signtool: $signtool"

      - name: Prepare Windows signing certificate
        if: ${{ secrets.TAURI_AGENT_WINDOWS_SIGN_CERT_BASE64 != '' }}
        shell: pwsh
        env:
          WINDOWS_SIGN_CERT_BASE64: ${{ secrets.TAURI_AGENT_WINDOWS_SIGN_CERT_BASE64 }}
          WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.TAURI_AGENT_WINDOWS_SIGN_CERT_PASSWORD }}
        run: |
          $certDir = Join-Path $env:RUNNER_TEMP "codesign"
          New-Item -ItemType Directory -Force -Path $certDir | Out-Null

          $certPath = Join-Path $certDir "windows-release-cert.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGN_CERT_BASE64))

          "TAURI_AGENT_WINDOWS_SIGN_CERT_FILE=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_CERT_PASSWORD)) {
            @"
TAURI_AGENT_WINDOWS_SIGN_CERT_PASSWORD<<EOF
$env:WINDOWS_SIGN_CERT_PASSWORD
EOF
"@ | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

          Write-Host "Prepared Windows signing certificate at $certPath"

      - name: Report signing mode
        shell: pwsh
        env:
          WINDOWS_SIGN_CERT_BASE64: ${{ secrets.TAURI_AGENT_WINDOWS_SIGN_CERT_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_CERT_BASE64)) {
            Write-Host "Windows signing secrets are not configured; continuing with unsigned build artifacts."
          } else {
            Write-Host "Windows signing secrets detected; release artifacts will be Authenticode-signed."
          }

      - name: Build portable release
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_VERSION)) {
            ./scripts/release.ps1 -VendorRoot $env:TAURI_AGENT_VENDOR_ROOT -SkipRuntimePrepare
          } else {
            ./scripts/release.ps1 -Version $env:RELEASE_VERSION -VendorRoot $env:TAURI_AGENT_VENDOR_ROOT -SkipRuntimePrepare
          }

      - name: Smoke test packaged backend
        shell: pwsh
        run: |
          $portableZipPattern = "artifacts/release/*/portable/*.zip"
          $portableZips = @(Get-ChildItem -Path $portableZipPattern -File)
          if ($portableZips.Count -ne 1) {
            Write-Host "Portable ZIP pattern: $portableZipPattern"
            if (Test-Path -LiteralPath "artifacts/release") {
              Write-Host "Current artifacts/release contents:"
              Get-ChildItem -Path artifacts/release -Recurse | Select-Object FullName | Format-Table -HideTableHeaders | Out-String | Write-Host
            }
            throw "Expected exactly one portable ZIP artifact, found $($portableZips.Count)."
          }

          $runtimeZip = $portableZips[0]

          $smokeRoot = Join-Path $env:RUNNER_TEMP "portable-smoke"
          if (Test-Path -LiteralPath $smokeRoot) {
            Remove-Item -LiteralPath $smokeRoot -Recurse -Force
          }

          Expand-Archive -LiteralPath $runtimeZip.FullName -DestinationPath (Join-Path $smokeRoot "runtime") -Force

          $runtimeAppRoot = Get-ChildItem -Path (Join-Path $smokeRoot "runtime") -Directory | Select-Object -First 1
          if ($null -eq $runtimeAppRoot) {
            throw "Runtime ZIP did not extract a portable app directory."
          }

          if (Test-Path -LiteralPath (Join-Path $runtimeAppRoot.FullName "resources/resources")) {
            throw "Runtime ZIP still contains nested resources/resources directories."
          }

          $appExe = Get-ChildItem -Path $runtimeAppRoot.FullName -File -Filter "work agent.exe" | Select-Object -First 1
          if ($null -eq $appExe) {
            throw "Portable app executable work agent.exe was not found under $($runtimeAppRoot.FullName)"
          }

          foreach ($requiredRuntimeDir in @(
            (Join-Path $runtimeAppRoot.FullName "runtimes/python"),
            (Join-Path $runtimeAppRoot.FullName "runtimes/node")
          )) {
            if (-not (Test-Path -LiteralPath $requiredRuntimeDir)) {
              throw "Runtime ZIP is missing required runtime directory: $requiredRuntimeDir"
            }
          }

          $backendExe = Get-ChildItem -Path (Join-Path $smokeRoot "runtime") -Recurse -Filter core.exe | Select-Object -First 1
          if ($null -eq $backendExe) {
            throw "Packaged backend executable was not found after extracting $($runtimeZip.FullName)"
          }

          $stdoutLog = Join-Path $smokeRoot "backend-stdout.log"
          $stderrLog = Join-Path $smokeRoot "backend-stderr.log"

          $process = Start-Process -FilePath $backendExe.FullName -PassThru `
            -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog -NoNewWindow

          try {
            $healthy = $false
            for ($attempt = 0; $attempt -lt 15; $attempt++) {
              Start-Sleep -Seconds 1

              # Check if backend process crashed (exited before health check passed)
              if ($process.HasExited) {
                Write-Host "Backend process exited prematurely with code $($process.ExitCode)"
                Write-Host "=== STDOUT ==="
                if (Test-Path -LiteralPath $stdoutLog) { Get-Content -LiteralPath $stdoutLog }
                Write-Host "=== STDERR ==="
                if (Test-Path -LiteralPath $stderrLog) { Get-Content -LiteralPath $stderrLog }
                throw "Backend crashed on startup (exit code $($process.ExitCode)). Check logs above."
              }

              try {
                $response = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:8765/health"
                if ($response.StatusCode -eq 200) {
                  $healthy = $true
                  Write-Host "Backend health check passed (attempt $($attempt + 1))"
                  break
                }
              }
              catch {
              }
            }

            if (-not $healthy) {
              Write-Host "Backend never became healthy after 15 attempts"
              Write-Host "=== STDOUT ==="
              if (Test-Path -LiteralPath $stdoutLog) { Get-Content -LiteralPath $stdoutLog }
              Write-Host "=== STDERR ==="
              if (Test-Path -LiteralPath $stderrLog) { Get-Content -LiteralPath $stderrLog }
              throw "Packaged backend did not become healthy on http://127.0.0.1:8765/health"
            }
          }
          finally {
            if ($null -ne $process -and -not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Upload portable ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-zip
          path: artifacts/release/*/portable/*.zip
          if-no-files-found: error

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: artifacts/release/*/bundle/**
          if-no-files-found: error

      - name: Prepare GitHub Pages payload
        shell: pwsh
        run: |
          $bundleRoots = @(Get-ChildItem -Path "artifacts/release/*/bundle" -Directory)
          if ($bundleRoots.Count -ne 1) {
            throw "Expected exactly one bundle directory for GitHub Pages deployment, found $($bundleRoots.Count)."
          }

          $pagesRoot = Join-Path $env:RUNNER_TEMP "github-pages"
          if (Test-Path -LiteralPath $pagesRoot) {
            Remove-Item -LiteralPath $pagesRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $pagesRoot | Out-Null
          Copy-Item -LiteralPath (Join-Path $bundleRoots[0].FullName "*") -Destination $pagesRoot -Recurse -Force

          if (-not (Test-Path -LiteralPath (Join-Path $pagesRoot "latest.json"))) {
            throw "GitHub Pages payload is missing latest.json. Ensure updater configuration is available before publishing."
          }

          Write-Host "Prepared GitHub Pages payload at $pagesRoot"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/github-pages

      - name: Publish ZIP assets to GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $tagName = $env:GITHUB_REF_NAME
          $releaseTitle = $tagName
          $portableZipPattern = "artifacts/release/*/portable/*.zip"
          $zipFiles = @(Get-ChildItem -Path $portableZipPattern -File)

          if ($zipFiles.Count -ne 1) {
            Write-Host "Portable ZIP pattern: $portableZipPattern"
            if (Test-Path -LiteralPath "artifacts/release") {
              Write-Host "Current artifacts/release contents:"
              Get-ChildItem -Path artifacts/release -Recurse | Select-Object FullName | Format-Table -HideTableHeaders | Out-String | Write-Host
            }
            throw "Expected exactly one portable ZIP artifact before publishing the GitHub release, found $($zipFiles.Count)."
          }

          gh release view $tagName --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tagName --repo $env:GITHUB_REPOSITORY --title $releaseTitle --generate-notes
          }

          gh release upload $tagName --repo $env:GITHUB_REPOSITORY --clobber $zipFiles[0].FullName

      - name: Publish bundle assets to GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $tagName = $env:GITHUB_REF_NAME
          $bundleFiles = @(Get-ChildItem -Path "artifacts/release/*/bundle" -Recurse -File)

          if ($bundleFiles.Count -eq 0) {
            throw "No bundle artifacts were found for GitHub Release upload."
          }

          gh release upload $tagName --repo $env:GITHUB_REPOSITORY --clobber $bundleFiles.FullName

  deploy-gh-pages:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
