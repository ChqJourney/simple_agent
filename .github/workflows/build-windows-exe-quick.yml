name: build-windows-exe-quick

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Optional release version override, for example 0.1.1
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.12"
          cache: pip
          cache-dependency-path: python_backend/requirements.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Download runtime source archives
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw scripts/runtime-manifest.json | ConvertFrom-Json

          $pythonArchiveUrl = "https://www.python.org/ftp/python/$($manifest.python.version)/$($manifest.python.embeddableArchive)"
          $nodeArchiveUrl = "https://nodejs.org/dist/v$($manifest.node.version)/$($manifest.node.archive)"

          $vendorRoot = Join-Path $env:RUNNER_TEMP "vendor"
          $pythonDownloadDir = Join-Path $vendorRoot "downloads/python"
          $nodeDownloadDir = Join-Path $vendorRoot "downloads/node"

          foreach ($dir in @($pythonDownloadDir, $nodeDownloadDir)) {
            New-Item -ItemType Directory -Force -Path $dir | Out-Null
          }

          $pythonArchivePath = Join-Path $pythonDownloadDir $manifest.python.embeddableArchive
          $nodeArchivePath = Join-Path $nodeDownloadDir $manifest.node.archive

          Write-Host "Downloading Python embeddable package: $pythonArchiveUrl"
          Invoke-WebRequest -Uri $pythonArchiveUrl -OutFile $pythonArchivePath

          Write-Host "Downloading Node.js archive: $nodeArchiveUrl"
          Invoke-WebRequest -Uri $nodeArchiveUrl -OutFile $nodeArchivePath

          "TAURI_AGENT_VENDOR_ROOT=$vendorRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare embedded runtimes
        shell: pwsh
        run: ./scripts/prepare-runtimes.ps1 -VendorRoot $env:TAURI_AGENT_VENDOR_ROOT

      - name: Build backend sidecar
        shell: pwsh
        run: |
          python -m venv python_backend/.venv
          ./scripts/build-backend.ps1 -VendorRoot $env:TAURI_AGENT_VENDOR_ROOT -SkipRuntimePrepare

      - name: Resolve release version
        shell: pwsh
        run: |
          $releaseVersion = ""

          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch" -and (Test-Path -LiteralPath $env:GITHUB_EVENT_PATH)) {
            $eventPayload = Get-Content -Raw -LiteralPath $env:GITHUB_EVENT_PATH | ConvertFrom-Json
            if ($null -ne $eventPayload.inputs) {
              $releaseVersion = "$($eventPayload.inputs.release_version)"
            }
          }

          if (-not [string]::IsNullOrWhiteSpace($releaseVersion) -and $releaseVersion.StartsWith("v")) {
            $releaseVersion = $releaseVersion.Substring(1)
          }

          "RELEASE_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Tauri release executable
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_VERSION)) {
            ./scripts/package-app.ps1 -VendorRoot $env:TAURI_AGENT_VENDOR_ROOT -SkipBackendBuild
          } else {
            ./scripts/package-app.ps1 -Version $env:RELEASE_VERSION -VendorRoot $env:TAURI_AGENT_VENDOR_ROOT -SkipBackendBuild
          }

      - name: Prepare EXE artifact
        shell: pwsh
        run: |
          $builtExe = Join-Path $PWD "src-tauri/target/release/tauri_agent.exe"
          if (-not (Test-Path -LiteralPath $builtExe)) {
            throw "Could not find compiled Tauri executable: $builtExe"
          }

          $artifactRoot = Join-Path $env:RUNNER_TEMP "windows-work-agent-exe"
          if (Test-Path -LiteralPath $artifactRoot) {
            Remove-Item -LiteralPath $artifactRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $artifactRoot | Out-Null
          Copy-Item -LiteralPath $builtExe -Destination (Join-Path $artifactRoot "work agent.exe") -Force

      - name: Upload work agent.exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-work-agent-exe
          path: ${{ runner.temp }}/windows-work-agent-exe/work agent.exe
          if-no-files-found: error
