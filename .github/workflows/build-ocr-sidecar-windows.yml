name: build-ocr-sidecar-windows

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-ocr-sidecar-windows.yml"
      - "ocr_sidecar/**"
      - "scripts/build-ocr-sidecar.ps1"
      - "scripts/common.ps1"
      - "docs/plans/ocr-sidecar-design.md"
  pull_request:
    paths:
      - ".github/workflows/build-ocr-sidecar-windows.yml"
      - "ocr_sidecar/**"
      - "scripts/build-ocr-sidecar.ps1"
      - "scripts/common.ps1"
      - "docs/plans/ocr-sidecar-design.md"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create OCR build virtualenv
        shell: pwsh
        run: |
          python -m venv ocr_sidecar/.venv
          ocr_sidecar/.venv/Scripts/python.exe --version

      - name: Build OCR sidecar
        shell: pwsh
        run: |
          ./scripts/build-ocr-sidecar.ps1 -SkipRuntimePrepare

      - name: Smoke test OCR sidecar executable
        shell: pwsh
        run: |
          $distRoot = "dist/ocr-sidecar/current"
          $ocrExe = Join-Path $distRoot "ocr-server.exe"
          $manifestPath = Join-Path $distRoot "manifest.json"

          if (-not (Test-Path -LiteralPath $ocrExe)) {
            throw "OCR sidecar executable not found: $ocrExe"
          }

          if (-not (Test-Path -LiteralPath $manifestPath)) {
            throw "OCR sidecar manifest not found: $manifestPath"
          }

          & $ocrExe --help | Out-Null

      - name: Upload OCR sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocr-sidecar-windows
          path: dist/ocr-sidecar/current/**
          if-no-files-found: error
